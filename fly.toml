# fly.toml — onlinejourno-platform (apps/web, Next.js standalone)
# Deploys from repo root: fly deploy
app = "onlinejourno-platform"
# Primary region: prefer BOM (Mumbai, ~30ms from India). Fell back to
# SIN (Singapore, ~70ms) on 2026-06-03 when BOM had no capacity.
# Revisit and switch back to BOM when capacity returns.
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
