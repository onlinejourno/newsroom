<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80" width="440" height="80" role="img" aria-label="OnlineJournalism.in">
  <title>OnlineJournalism.in</title>

  <!-- Red square monogram -->
  <rect x="0" y="4" width="72" height="72" rx="8" fill="#f04031"/>
  <text
    x="36" y="44"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    fill="#fbfbfb"
    letter-spacing="-1.5">OJ</text>

  <!-- Divider -->
  <line x1="88" y1="14" x2="88" y2="66" stroke="#e0ded8" stroke-width="1"/>

  <!-- Wordmark: OnlineJournalism -->
  <text
    x="104" y="34"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    fill="#111111"
    letter-spacing="-0.8">OnlineJournalism</text>

  <!-- Domain suffix .in -->
  <text
    x="106" y="59"
    dominant-baseline="central"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="400"
    fill="#f04031"
    letter-spacing="3">.IN</text>

  <!-- Tagline -->
  <text
    x="152" y="59"
    dominant-baseline="central"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#888780"
    letter-spacing="0.5">India's reference for digital journalism</text>

</svg>
