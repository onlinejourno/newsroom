# Fly.io configuration for the OnlineJourno web app.
# Deploy from repo root with:
#   fly deploy --config apps/web/fly.toml --dockerfile apps/web/Dockerfile

app = "onlinejourno-platform"
primary_region = "bom"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  size = "shared-cpu-1x"
