[project]
name = "onlinejourno-ingest"
version = "0.0.1"
description = "OnlineJourno ingestion library — source collectors that write signals to Postgres."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Subhash Rai" }]

dependencies = [
  "psycopg[binary]>=3.2",
  "feedparser>=6.0.11",
  "requests>=2.31",
  "beautifulsoup4>=4.12",
  "lxml>=5.0",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",
]

[project.scripts]
onlinejourno-ingest = "onlinejourno_ingest.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onlinejourno_ingest"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
