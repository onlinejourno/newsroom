[project]
name = "onlinejourno-scoring"
version = "0.0.0"
description = "Placeholder. Python scoring library (PEJ framing, EEAT, SQEG, recirculation). Built out Wk 9+ when discover-seo / framing-pej modules ship."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Subhash Rai" }]
dependencies = [
  "requests>=2.31",
  "beautifulsoup4>=4.12",
  "lxml>=5.0",
  "feedparser>=6.0",
]

[project.scripts]
onlinejourno-scoring = "onlinejourno_scoring.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onlinejourno_scoring"]
