[project]
name = "onlinejourno-agents"
version = "0.0.1"
description = "OnlineJourno LLM agents — ingest-score (shortlist) and brief-compose (daily brief). Single-shot structured calls, provider-agnostic (Claude / OpenAI-compatible / self-hosted), cost-capped, fully traced."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Subhash Rai" }]

dependencies = [
  "psycopg[binary]>=3.2",
  "anthropic>=0.40",
  "openai>=1.40",
  "requests>=2.31",
  "beautifulsoup4>=4.12",
  "python-dotenv>=1.0",
]

[project.optional-dependencies]
nlp = ["spacy>=3.7", "click>=8"]

[project.scripts]
onlinejourno-agents = "onlinejourno_agents.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onlinejourno_agents"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
# DB-backed tests are marked `integration` and skipped by default (like scoring-py);
# run them with a live DATABASE_URL via: pytest -m integration
markers = ["integration: needs a live DATABASE_URL / Postgres"]
addopts = "-m 'not integration'"
