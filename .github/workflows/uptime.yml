# Uptime monitor for the OnlineJourno service fleet.
#
# Values: FOSS-first, no commercial SaaS uptime vendor (ADR 0028).
# Each service is pinged; any failure pushes an ntfy.sh alert naming the
# service. ntfy is FOSS; self-host later and set NTFY_BASE_URL without
# touching this workflow.
#
# Setup:
#   1. Generate a random topic name: `openssl rand -hex 8`
#   2. GitHub repo → Settings → Secrets and variables → Actions → New repo secret
#        Name: NTFY_TOPIC   Value: <the random hex string>
#   3. (Optional) Set repo variable NTFY_BASE_URL if you self-host.
#   4. Install the ntfy app on your phone AND subscribe to the topic — the
#      push pipeline is useless if no device is subscribed.
#
# Adding a service: append one entry to the matrix below. `expect` is a
# fixed (non-regex) substring that must appear in a healthy response body;
# pick one distinctive to a WORKING page so a soft-404 that still renders
# the shared nav can't false-pass.
#
# Cadence: GitHub Actions cron minimum is 5 min (jitters up to ~15 on free
# tier). 15 min is acceptable for solo bootstrap.

name: uptime-check

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: uptime
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false            # one service down must not cancel the others
      matrix:
        include:
          # Platform app — DEEP readiness (verifies DB reachability, not just
          # that the process is up). This is the check that catches a broken
          # DATABASE_URL while /api/health stays green.
          - name: app (platform)
            url: https://app.onlinejourno.com/api/ready
            expect: '"status":"ok"'
          # Crawl-Budget Analyser — frontend proxy + FastAPI backend in one hop.
          - name: crawl-budget-analyser
            url: https://tools.onlinejourno.com/crawl-budget-analyser/api/health
            expect: '"ok":true'
          # Tare — backend has no health route; ping the rendered page. `expect`
          # is a title-only phrase, absent from the shared nav.
          - name: tare
            url: https://tools.onlinejourno.com/tare
            expect: 'Reader Respect'
          - name: daybook
            url: https://daybook.onlinejourno.com/
            expect: 'predictive editorial calendar'
          - name: galley
            url: https://galley.onlinejourno.com/
            expect: 'GTmetrix'
          - name: frontmatter
            url: https://frontmatter.onlinejourno.com/
            expect: 'merit vs reach'
          - name: marketing (onlinejourno.com)
            url: https://onlinejourno.com/
            expect: 'Tools for Journalists'
    steps:
      - name: Ping
        id: ping
        env:
          TARGET_URL: ${{ matrix.url }}
          EXPECT: ${{ matrix.expect }}
        run: |
          set +e
          # -L follows redirects; --compressed handles gzip/br; generous
          # timeout + retries so a Fly scale-to-zero cold start doesn't read
          # as an outage. Command substitution (not process substitution) so
          # $? is curl's real exit, not read's.
          resp=$(curl -o /tmp/body -sL --compressed \
                   -A "OnlineJourno-UptimeBot/1.0 (+https://onlinejourno.com)" \
                   -w "%{http_code} %{time_total}" \
                   --max-time 30 --retry 3 --retry-delay 5 --retry-connrefused \
                   "$TARGET_URL")
          curl_exit=$?
          status=${resp%% *}
          total_time=${resp##* }
          body="$(cat /tmp/body 2>/dev/null || true)"
          # Collapse the excerpt to ONE line — a multi-line value (e.g. an HTML
          # page) written as key=value corrupts $GITHUB_OUTPUT and fails the job.
          excerpt=$(printf '%s' "${body:0:200}" | tr '\n\r\t' '   ' | tr -s ' ')

          echo "Service: $TARGET_URL"
          echo "HTTP status: $status   time: ${total_time}s   curl_exit: $curl_exit"
          echo "Body (first 200 chars): $excerpt"

          {
            echo "status=$status"
            echo "total_time=$total_time"
            echo "curl_exit=$curl_exit"
            echo "body_excerpt=$excerpt"
          } >> "$GITHUB_OUTPUT"

          # Pass = curl OK AND HTTP 200 AND the expected fixed substring present.
          # Workflow itself exits 0 even on fail — the ntfy push is the signal,
          # so a real outage does not also spam failed-workflow noise.
          if [ "$curl_exit" = "0" ] && [ "$status" = "200" ] && printf '%s' "$body" | grep -qF -- "$EXPECT"; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert on failure
        if: steps.ping.outputs.result == 'fail'
        env:
          NTFY_BASE_URL: ${{ vars.NTFY_BASE_URL || 'https://ntfy.sh' }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SERVICE: ${{ matrix.name }}
          URL: ${{ matrix.url }}
          STATUS: ${{ steps.ping.outputs.status }}
          TIME: ${{ steps.ping.outputs.total_time }}
          BODY: ${{ steps.ping.outputs.body_excerpt }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "::error::NTFY_TOPIC secret not set; cannot alert."
            exit 1
          fi
          message="OnlineJourno service DOWN: ${SERVICE}
          URL: ${URL}
          HTTP status: ${STATUS}
          Response time: ${TIME}s
          Body excerpt: ${BODY}
          Checked (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          curl -s -X POST \
            -H "Title: DOWN — ${SERVICE}" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light,warning" \
            -d "$message" \
            "${NTFY_BASE_URL%/}/${NTFY_TOPIC}"
